name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PF_BUILDAH_CACHE_DIR: /var/tmp/buildah-cache-0

jobs:
  image-builder:
    name: Build image builder
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Checkout pocketfed
        uses: actions/checkout@v7
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --assume-yes --no-install-recommends \
            just \
            podman \
            skopeo

      - name: Restore Buildah cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.PF_BUILDAH_CACHE_DIR }}
          key: ${{ runner.os }}-${{ runner.arch }}-buildah-cache-image-builder-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-buildah-cache-image-builder-
            ${{ runner.os }}-${{ runner.arch }}-buildah-cache-

      - name: Prepare image ref
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          printf 'PF_CI_BUILDER_IMAGE=%s\n' "ghcr.io/${owner}/pocketfed-image-builder:rawhide" >>"$GITHUB_ENV"
          printf 'PF_CI_OWNER=%s\n' "$owner" >>"$GITHUB_ENV"

      - name: Build image builder
        run: |
          PF_BUILDER_IMAGE="$PF_CI_BUILDER_IMAGE" \
          just builder

      - name: Verify image builder
        run: sudo podman run --rm --pull=never "$PF_CI_BUILDER_IMAGE" --help

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          printf '%s\n' '${{ secrets.GITHUB_TOKEN }}' | sudo skopeo login ghcr.io --username "$GITHUB_ACTOR" --password-stdin

      - name: Push image builder to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          sudo skopeo copy --all \
            "containers-storage:$PF_CI_BUILDER_IMAGE" \
            "docker://$PF_CI_BUILDER_IMAGE"
          sudo skopeo copy --all \
            "containers-storage:$PF_CI_BUILDER_IMAGE" \
            "docker://ghcr.io/${PF_CI_OWNER}/pocketfed-image-builder:sha-${GITHUB_SHA::12}"

      - name: Prepare Buildah cache for save
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        run: |
          sudo mkdir -p "$PF_BUILDAH_CACHE_DIR"
          sudo chmod -R a+rX "$PF_BUILDAH_CACHE_DIR"

      - name: Save Buildah cache
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: actions/cache/save@v5
        with:
          path: ${{ env.PF_BUILDAH_CACHE_DIR }}
          key: ${{ runner.os }}-${{ runner.arch }}-buildah-cache-image-builder-${{ github.run_id }}-${{ github.run_attempt }}

  base-oci:
    name: Build base OCI
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 240

    steps:
      - name: Checkout pocketfed
        uses: actions/checkout@v7
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up mkosi
        uses: systemd/mkosi@v26

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --assume-yes --no-install-recommends \
            just \
            skopeo \
            zstd

      - name: Prepare mkosi submodule
        run: just submodule vendor/make-dynpart-mappings

      - name: Restore mkosi package cache
        uses: actions/cache/restore@v5
        with:
          path: base/mkosi.pkgcache
          key: ${{ runner.os }}-${{ runner.arch }}-mkosi-pkgcache-v1-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-mkosi-pkgcache-v1-

      - name: Build base OCI
        run: |
          PF_MKOSI='mkosi -f --wipe-build-dir --cache-only=never' just base

      - name: Pack base OCI artifact
        if: github.event_name != 'push'
        run: |
          mkdir -p .cache/base-oci
          tar --create --file .cache/base-oci/pocketfed-base.oci.tar.zst --zstd -C base/mkosi.output pocketfed-base.oci

      - name: Upload base OCI artifact
        if: github.event_name != 'push'
        uses: actions/upload-artifact@v5
        with:
          name: pocketfed-base-oci
          path: .cache/base-oci/pocketfed-base.oci.tar.zst
          retention-days: 1
          if-no-files-found: error

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push base OCI to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          image="ghcr.io/${owner}/pocketfed-base"
          source="oci:base/mkosi.output/pocketfed-base.oci:rawhide"
          skopeo copy --all "$source" "docker://${image}:rawhide"
          skopeo copy --all "$source" "docker://${image}:sha-${GITHUB_SHA::12}"

      - name: Prepare mkosi package cache for save
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        run: |
          sudo mkdir -p base/mkosi.pkgcache
          sudo chmod -R a+rX base/mkosi.pkgcache

      - name: Save mkosi package cache
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: actions/cache/save@v5
        with:
          path: base/mkosi.pkgcache
          key: ${{ runner.os }}-${{ runner.arch }}-mkosi-pkgcache-v1-${{ github.run_id }}-${{ github.run_attempt }}

  phosh-oci:
    name: Build Phosh OCI
    runs-on: ubuntu-24.04-arm
    needs: base-oci
    timeout-minutes: 180

    steps:
      - name: Checkout pocketfed
        uses: actions/checkout@v7
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --assume-yes --no-install-recommends \
            just \
            podman \
            skopeo \
            zstd

      - name: Restore Buildah cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.PF_BUILDAH_CACHE_DIR }}
          key: ${{ runner.os }}-${{ runner.arch }}-buildah-cache-phosh-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-buildah-cache-phosh-
            ${{ runner.os }}-${{ runner.arch }}-buildah-cache-

      - name: Prepare image refs
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          if [[ "${{ github.event_name }}" == "push" ]]; then
            base_image="ghcr.io/${owner}/pocketfed-base:rawhide"
            phosh_image="ghcr.io/${owner}/pocketfed-phosh:rawhide"
          else
            base_image="localhost/pocketfed-base:rawhide"
            phosh_image="localhost/pocketfed-phosh:rawhide"
          fi

          printf 'PF_CI_BASE_IMAGE=%s\n' "$base_image" >>"$GITHUB_ENV"
          printf 'PF_CI_PHOSH_IMAGE=%s\n' "$phosh_image" >>"$GITHUB_ENV"
          printf 'PF_CI_PHOSH_BUILD_IMAGE=%s\n' 'localhost/pocketfed-phosh:build' >>"$GITHUB_ENV"
          printf 'PF_CI_OWNER=%s\n' "$owner" >>"$GITHUB_ENV"

      - name: Download base OCI artifact
        if: github.event_name != 'push'
        uses: actions/download-artifact@v5
        with:
          name: pocketfed-base-oci
          path: .cache/base-oci

      - name: Import base OCI artifact
        if: github.event_name != 'push'
        run: |
          mkdir -p .cache/base-oci/unpacked
          tar --extract --file .cache/base-oci/pocketfed-base.oci.tar.zst --zstd -C .cache/base-oci/unpacked
          sudo skopeo copy --all \
            oci:.cache/base-oci/unpacked/pocketfed-base.oci:rawhide \
            "containers-storage:$PF_CI_BASE_IMAGE"

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          printf '%s\n' '${{ secrets.GITHUB_TOKEN }}' | sudo skopeo login ghcr.io --username "$GITHUB_ACTOR" --password-stdin

      - name: Pull canonical base OCI
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: sudo podman pull --arch arm64 "$PF_CI_BASE_IMAGE"

      - name: Inspect base OCI
        run: |
          sudo podman image inspect \
            --format '{{.Id}} {{.Os}}/{{.Architecture}} {{.RepoTags}}' \
            "$PF_CI_BASE_IMAGE"
          sudo skopeo inspect "containers-storage:$PF_CI_BASE_IMAGE"
          sudo skopeo inspect --config "containers-storage:$PF_CI_BASE_IMAGE"

      - name: Build Phosh OCI
        run: |
          PF_DESKTOP=phosh \
          PF_DESKTOP_BASE="$PF_CI_BASE_IMAGE" \
          PF_DESKTOP_IMAGE="$PF_CI_PHOSH_IMAGE" \
          PF_DESKTOP_BUILD_IMAGE="$PF_CI_PHOSH_BUILD_IMAGE" \
          PF_DESKTOP_PULL=never \
          just desktop

      - name: Verify Phosh packages
        run: |
          sudo podman run --rm --pull=never --arch arm64 "$PF_CI_PHOSH_IMAGE" \
            rpm -q phosh phrog calls chatty feedbackd phosh-mobile-settings

      - name: Inspect Phosh OCI
        run: sudo skopeo inspect "containers-storage:$PF_CI_PHOSH_IMAGE"

      - name: Pack Phosh OCI artifact
        if: github.event_name != 'push'
        run: |
          rm -rf .cache/phosh-oci
          mkdir -p .cache/phosh-oci
          sudo skopeo copy --all \
            "containers-storage:$PF_CI_PHOSH_IMAGE" \
            "oci:.cache/phosh-oci/pocketfed-phosh.oci:rawhide"
          sudo tar --create --file .cache/phosh-oci/pocketfed-phosh.oci.tar.zst --zstd -C .cache/phosh-oci pocketfed-phosh.oci
          sudo chown "$(id -u):$(id -g)" .cache/phosh-oci/pocketfed-phosh.oci.tar.zst

      - name: Upload Phosh OCI artifact
        if: github.event_name != 'push'
        uses: actions/upload-artifact@v5
        with:
          name: pocketfed-phosh-oci
          path: .cache/phosh-oci/pocketfed-phosh.oci.tar.zst
          retention-days: 1
          if-no-files-found: error

      - name: Push Phosh OCI to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          sudo skopeo copy --all \
            "containers-storage:$PF_CI_PHOSH_IMAGE" \
            "docker://$PF_CI_PHOSH_IMAGE"
          sudo skopeo copy --all \
            "containers-storage:$PF_CI_PHOSH_IMAGE" \
            "docker://ghcr.io/${PF_CI_OWNER}/pocketfed-phosh:sha-${GITHUB_SHA::12}"

      - name: Prepare Buildah cache for save
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        run: |
          sudo mkdir -p "$PF_BUILDAH_CACHE_DIR"
          sudo chmod -R a+rX "$PF_BUILDAH_CACHE_DIR"

      - name: Save Buildah cache
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: actions/cache/save@v5
        with:
          path: ${{ env.PF_BUILDAH_CACHE_DIR }}
          key: ${{ runner.os }}-${{ runner.arch }}-buildah-cache-phosh-${{ github.run_id }}-${{ github.run_attempt }}

  device-oci:
    name: Build Device OCI (${{ matrix.device }})
    runs-on: ubuntu-24.04-arm
    needs: phosh-oci
    timeout-minutes: 180

    strategy:
      fail-fast: false
      matrix:
        device:
          - google-sargo

    steps:
      - name: Checkout pocketfed
        uses: actions/checkout@v7
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --assume-yes --no-install-recommends \
            just \
            podman \
            skopeo \
            zstd

      - name: Restore Buildah cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.PF_BUILDAH_CACHE_DIR }}
          key: ${{ runner.os }}-${{ runner.arch }}-buildah-cache-device-${{ matrix.device }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-buildah-cache-device-${{ matrix.device }}-
            ${{ runner.os }}-${{ runner.arch }}-buildah-cache-device-
            ${{ runner.os }}-${{ runner.arch }}-buildah-cache-

      - name: Prepare image refs
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          device="${{ matrix.device }}"
          if [[ "${{ github.event_name }}" == "push" ]]; then
            phosh_image="ghcr.io/${owner}/pocketfed-phosh:rawhide"
            device_image="ghcr.io/${owner}/pocketfed-phosh-${device}:rawhide"
          else
            phosh_image="localhost/pocketfed-phosh:rawhide"
            device_image="localhost/pocketfed-phosh-${device}:rawhide"
          fi

          printf 'PF_CI_PHOSH_IMAGE=%s\n' "$phosh_image" >>"$GITHUB_ENV"
          printf 'PF_CI_DEVICE_IMAGE=%s\n' "$device_image" >>"$GITHUB_ENV"
          printf 'PF_CI_DEVICE=%s\n' "$device" >>"$GITHUB_ENV"
          printf 'PF_CI_OWNER=%s\n' "$owner" >>"$GITHUB_ENV"

      - name: Download Phosh OCI artifact
        if: github.event_name != 'push'
        uses: actions/download-artifact@v5
        with:
          name: pocketfed-phosh-oci
          path: .cache/phosh-oci

      - name: Import Phosh OCI artifact
        if: github.event_name != 'push'
        run: |
          mkdir -p .cache/phosh-oci/unpacked
          tar --extract --file .cache/phosh-oci/pocketfed-phosh.oci.tar.zst --zstd -C .cache/phosh-oci/unpacked
          sudo skopeo copy --all \
            oci:.cache/phosh-oci/unpacked/pocketfed-phosh.oci:rawhide \
            "containers-storage:$PF_CI_PHOSH_IMAGE"

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          printf '%s\n' '${{ secrets.GITHUB_TOKEN }}' | sudo skopeo login ghcr.io --username "$GITHUB_ACTOR" --password-stdin

      - name: Pull canonical Phosh OCI
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: sudo podman pull --arch arm64 "$PF_CI_PHOSH_IMAGE"

      - name: Inspect Phosh OCI
        run: |
          sudo podman image inspect \
            --format '{{.Id}} {{.Os}}/{{.Architecture}} {{.RepoTags}}' \
            "$PF_CI_PHOSH_IMAGE"
          sudo skopeo inspect "containers-storage:$PF_CI_PHOSH_IMAGE"

      - name: Build Device OCI
        run: |
          PF_DEVICE="$PF_CI_DEVICE" \
          PF_DEVICE_BASE="$PF_CI_PHOSH_IMAGE" \
          PF_DEVICE_IMAGE="$PF_CI_DEVICE_IMAGE" \
          just device

      - name: Verify Device OCI
        run: |
          sudo podman run --rm --pull=never --arch arm64 "$PF_CI_DEVICE_IMAGE" \
            sh -eux -c '
              rpm -q phosh;
              set -- /usr/lib/modules/*;
              [ "$#" -eq 1 ];
              [ -f "$1/vmlinuz" ];
              [ -f "$1/initramfs.img" ];
              [ -f "$1/aboot.img" ];
            '

      - name: Inspect Device OCI
        run: sudo skopeo inspect "containers-storage:$PF_CI_DEVICE_IMAGE"

      - name: Push Device OCI to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          sudo skopeo copy --all \
            "containers-storage:$PF_CI_DEVICE_IMAGE" \
            "docker://$PF_CI_DEVICE_IMAGE"
          sudo skopeo copy --all \
            "containers-storage:$PF_CI_DEVICE_IMAGE" \
            "docker://ghcr.io/${PF_CI_OWNER}/pocketfed-phosh-${PF_CI_DEVICE}:sha-${GITHUB_SHA::12}"

      - name: Prepare Buildah cache for save
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        run: |
          sudo mkdir -p "$PF_BUILDAH_CACHE_DIR"
          sudo chmod -R a+rX "$PF_BUILDAH_CACHE_DIR"

      - name: Save Buildah cache
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: actions/cache/save@v5
        with:
          path: ${{ env.PF_BUILDAH_CACHE_DIR }}
          key: ${{ runner.os }}-${{ runner.arch }}-buildah-cache-device-${{ matrix.device }}-${{ github.run_id }}-${{ github.run_attempt }}

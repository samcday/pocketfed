[Config]
MinimumVersion=26

[Distribution]
Distribution=fedora
Release=rawhide
Architecture=arm64

[Output]
Format=directory
ImageId=pocketfed-base
OutputDirectory=mkosi.output
ManifestFormat=json

[Content]
Bootable=no
Bootloader=none
UnifiedKernelImages=none
KernelModulesInitrd=no
MakeInitrd=no
Ssh=never
WithRecommends=no
WithDocs=no
CleanPackageMetadata=no
ExtraTrees=mkosi.local/kernel
RemoveFiles=
    /etc/fstab
    /etc/locale.conf
    /etc/vconsole.conf
SELinuxRelabel=yes
SourceDateEpoch=0

Packages=
    atheros-firmware
    bash
    blob-wrangler
    bootc
    container-selinux
    coreutils
    cryptsetup
    curl
    device-mapper-libs
    dnf5
    dnf5-plugins
    dosfstools
    dracut
    e2fsprogs
    glibc-langpack-en
    hostname
    iio-sensor-proxy
    iproute
    iputils
    kmod
    less
    libblkid
    libmd
    linux-firmware
    lvm2
    ModemManager
    NetworkManager
    NetworkManager-wifi
    NetworkManager-wwan
    nss-altfiles
    openssh-clients
    openssh-server
    ostree
    passwd
    policycoreutils
    polkit
    procps-ng
    qbootctl
    qcom-firmware
    rpm-ostree
    rmtfs
    selinux-policy-targeted
    shadow-utils
    sudo
    systemd
    systemd-pam
    systemd-resolved
    systemd-udev
    tqftpserv
    tzdata
    util-linux
    vim-minimal
    xfsprogs
    zram-generator-defaults

BuildPackages=
    glibc-devel
    libatomic
    libblkid-devel
    libmd-devel
    lvm2-devel

[Build]
CacheDirectory=mkosi.cache
BuildDirectory=mkosi.builddir
BuildSources=
    ../vendor/make-dynpart-mappings:make-dynpart-mappings
Incremental=yes
SandboxTrees=mkosi.sandbox
ToolsTree=yes
ToolsTreeDistribution=fedora
ToolsTreeRelease=rawhide
ToolsTreePackages=
    bootc
    gcc
    jq
    make
    pkgconf-pkg-config
    rpm-ostree

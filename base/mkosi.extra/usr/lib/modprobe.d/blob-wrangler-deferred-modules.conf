# Defer firmware-consuming Qualcomm radio, Wi-Fi, Bluetooth, and IPA modules
# until blob-wrangler has extracted the device-owned firmware into place.
# blob-wrangler.service explicitly modprobes these after successful extraction.
blacklist qcom_q6v5
blacklist qcom_q6v5_pas
blacklist qcom_q6v5_adsp
blacklist qcom_q6v5_mss
blacklist qcom_q6v5_wcss
blacklist qcom_wcnss_pil
blacklist qcom_common
blacklist qcom_sysmon
blacklist qcom_pil_info
blacklist ath10k_snoc
blacklist wcn36xx
blacklist wcnss_ctrl
blacklist btqca
blacklist btqcomsmd
blacklist hci_uart
blacklist ipa

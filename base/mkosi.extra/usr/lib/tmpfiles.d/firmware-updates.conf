# blob-wrangler fetches firmware from Android partitions and places it in
# /usr/lib/firmware/updates, which is a directory the kernel prefers to
# search before the main /usr/lib/firmware directory. Everything in /usr
# is immutable on OSTree systems, so we ensure /usr/lib/firmware/updates is
# symlinked to /var/lib/firmware-updates
d /var/lib/firmware-updates 0755 root root - -

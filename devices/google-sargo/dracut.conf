# Keep sargo initrds device-bound. Fedora/ARK kernels expose a much broader
# modular ARM64 driver set than the old downstream kernel, so generic dracut
# pulls in unrelated GPUs, storage, firmware, and platform drivers.
# Load DT-only suppliers before their consumers; modules.dep cannot express
# those relationships, and a probe that times out is not retried reliably.

force_drivers+=" \
    arm_smmu \
    clk_rpmh \
    cmd_db \
    fixed \
    gcc_sdm845 \
    icc_bcm_voter \
    icc_osm_l3 \
    llcc_qcom \
    pinctrl_sdm670 \
    qcom_ice \
    qcom_aoss \
    qcom_apcs_ipc_mailbox \
    qcom_hwspinlock \
    qcom_pdc \
    qcom_refgen_regulator \
    qcom_rpmh \
    qcom_rpmh_regulator \
    qcom_scm \
    reset_qcom_aoss \
    reset_qcom_pdc \
    rpmhpd \
    qnoc_sdm670 \
    nvmem_qfprom \
    gpucc_sdm845 \
    dispcc_sdm845 \
    panel_samsung_s6e3fa7 \
    msm \
    qcom_spmi_rradc \
    qcom_smbx \
    qcom_fg \
    sdhci_msm \
    sdhci_pltfm \
    sdhci \
    cqhci \
    mmc_core \
    mmc_block \
"

add_drivers+=" \
    gpi \
    qcom_geni_se \
    i2c_qcom_geni \
    rmi_i2c \
    rmi_core \
    dwc3_qcom_legacy \
    dwc3 \
    phy_qcom_qusb2 \
    qcom_geni_serial \
    gpio_keys \
"

filesystems+=" ext4 "
omit_dracutmodules+=" drm qemu nvdimm fido2 pkcs11 lunmask resume "

# Keep the crosshatch initrd device-bound. Force the SDM845 suppliers needed to
# discover UFS and mount the immutable ext4 root. ABL leaves the APSS watchdog
# armed on a normal slot boot, so qcom_wdt must be adopted before its
# bootloader-programmed timeout expires; dracut handles it both as the modular
# recovery driver and as the final kernel's built-in driver.

force_drivers+=" \
    gcc_sdm845 \
    qnoc_sdm845 \
    pinctrl_sdm845 \
    qcom_ice \
    qcom_wdt \
    phy_qcom_qmp_ufs \
    ufshcd_core \
    ufshcd_pltfrm \
    ufs_qcom \
"

# These are useful for the USB management link but are not root-storage
# dependencies, so a missing gadget path must not make the initrd unbootable.
add_drivers+=" \
    dwc3_qcom \
    dwc3 \
    phy_qcom_qusb2 \
"

filesystems+=" ext4 "
omit_dracutmodules+=" drm qemu nvdimm fido2 pkcs11 lunmask resume "
